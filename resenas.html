<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reseñas</title>

<style>
body {
  font-family: Georgia;
  background: #e8e1d5;
}

.contenedor {
  max-width: 800px;
  margin: auto;
  background: #f5f1ea;
  padding: 20px;
}

input, textarea {
  width: 100%;
  margin: 10px 0;
  padding: 8px;
}

button {
  background: #6a2e2e;
  color: white;
  padding: 10px;
  border: none;
}
</style>
</head>

<body>

<div class="contenedor">

<h2>Escribir reseña</h2>

<form id="form">
<input id="libro" placeholder="Libro" required>
<input id="autor" placeholder="Tu nombre" required>
<textarea id="contenido" required></textarea>
<button>Enviar</button>
</form>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const c = window.supabase.createClient(
  "https://vxodiycdileyqemlcxet.supabase.co",
  "sb_publishable_tn5y7SpuaTE6vfoLDoibFQ_o6sUqJ5J"
);

form.onsubmit = async e => {
  e.preventDefault();

  await c.from("resenas").insert([{
    libro: libro.value,
    autor: autor.value,
    contenido: contenido.value
  }]);

  alert("Reseña enviada (pendiente de aprobación)");
  form.reset();
};
</script>

</body>
</html>
