<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Catálogo</title>

<style>
body {
  font-family: Georgia;
  background: #e8e1d5;
  margin: 0;
}

.contenedor {
  max-width: 900px;
  margin: auto;
  background: #f5f1ea;
  padding: 30px;
}

nav {
  text-align: center;
  margin-bottom: 20px;
}

nav a {
  margin: 0 10px;
  text-decoration: none;
  color: #4f5b4a;
  font-weight: bold;
}

.libro {
  display: flex;
  gap: 20px;
  margin-bottom: 30px;
}

.portada {
  width: 130px;
}

.resena {
  background: #f9f6f1;
  padding: 10px;
  margin-top: 10px;
  border-left: 4px solid #6a2e2e;
}
</style>
</head>

<body>

<div class="contenedor">

<nav>
<a href="index.html">Inicio</a>
<a href="catalogo.html">Catálogo</a>
<a href="contacto.html">Contacto</a>
<a href="resenas.html">Reseñas</a>
</nav>

<h1>Catálogo</h1>

<div class="libro">
<img src="imagenes/libro1.jpg" class="portada">
<div>
<h2>Anna Karenina</h2>
<div id="resenas-anna"></div>
</div>
</div>

<div class="libro">
<img src="imagenes/libro2.jpg" class="portada">
<div>
<h2>Guerra y paz</h2>
<div id="resenas-guerra"></div>
</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = window.supabase.createClient(
  "https://vxodiycdileyqemlcxet.supabase.co",
  "sb_publishable_tn5y7SpuaTE6vfoLDoibFQ_o6sUqJ5J"
);

async function cargar(libro, id) {
  let { data } = await client
    .from("resenas")
    .select("*")
    .eq("aprobado", true)
    .ilike("libro", `%${libro}%`);

  let contenedor = document.getElementById(id);
  contenedor.innerHTML = "";

  if (data.length === 0) {
    contenedor.innerHTML = "<p>Sin reseñas aún.</p>";
    return;
  }

  data.forEach(r => {
    contenedor.innerHTML += `
      <div class="resena">
        ${r.contenido}<br>
        <i>${r.autor}</i>
      </div>
    `;
  });
}

cargar("Anna Karenina", "resenas-anna");
cargar("Guerra y paz", "resenas-guerra");
</script>

</body>
</html>
