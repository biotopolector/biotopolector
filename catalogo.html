<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Catálogo - Biotopo Lector</title>

<style>
body {
  font-family: Georgia, serif;
  background-color: #f4f1ea;
  margin: 0;
  text-align: center;
}

header img {
  width: 120px;
  margin-top: 20px;
}

nav {
  margin: 20px;
}

nav a {
  margin: 0 10px;
  text-decoration: none;
  color: #333;
}

.intro {
  margin-top: 20px;
}

.sub {
  margin-bottom: 30px;
  color: #666;
}

.grid {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
}

.libro {
  background: #fffdf8;
  padding: 15px;
  width: 220px;
  border: 1px solid #ddd5c7;
}

.libro img {
  width: 100%;
}

.boton {
  display: inline-block;
  margin-top: 8px;
  padding: 6px 12px;
  background-color: #6e0f1a;
  color: white;
  text-decoration: none;
  border-radius: 4px;
  font-size: 13px;
}

/* RESEÑAS */
.resenas {
  margin-top: 15px;
  text-align: left;
  font-size: 14px;
}

.titulo-resena {
  font-style: italic;
  color: #4f5b4a;
  margin-bottom: 8px;
}

.resena-item {
  margin-bottom: 10px;
  padding-left: 10px;
  border-left: 2px solid #ddd;
}

.resena-item span {
  font-size: 12px;
  color: #777;
}
</style>
</head>

<body>

<header>
  <img src="imagenes/logo.png">
</header>

<nav>
  <a href="index.html">Inicio</a>
  <a href="catalogo.html">Catálogo</a>
  <a href="contacto.html">Contacto</a>
</nav>

<div class="intro">
  libros escogidos desde una lectura personal
</div>

<div class="sub">
  clásicos, narrativa y títulos que permanecen
</div>

<div class="grid">

  <!-- ANNA KARENINA -->
  <div class="libro">
    <img src="imagenes/libro1.jpg">
    <h3>Anna Karenina</h3>
    <p>León Tolstói</p>
    <a class="boton" href="#">Consultar</a>

    <div class="resenas" id="resenas-Anna Karenina">
      <p class="titulo-resena">lecturas de la comunidad</p>
    </div>
  </div>

  <!-- GUERRA Y PAZ -->
  <div class="libro">
    <img src="imagenes/libro2.jpg">
    <h3>Guerra y paz</h3>
    <p>León Tolstói</p>
    <a class="boton" href="#">Consultar</a>

    <div class="resenas" id="resenas-Guerra y paz">
      <p class="titulo-resena">lecturas de la comunidad</p>
    </div>
  </div>

</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://vxodiycdileyqemlcxet.supabase.co";
const supabaseKey = "sb_publishable_tn5y7SpuaTE6vfoLDoibFQ_o6sUqJ5J";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function cargarResenas() {
  const { data, error } = await supabase
    .from("resenas")
    .select("*")
    .eq("aprobado", false);

  if (error) {
    console.log(error);
    return;
  }

  data.forEach(resena => {
  const nombre = resena.libro.trim().toLowerCase();

  document.querySelectorAll(".libro").forEach(libro => {
    const titulo = libro.querySelector("h3").textContent.trim().toLowerCase();

    if (titulo === nombre) {
      const contenedor = libro.querySelector(".resenas");

      const div = document.createElement("div");
      div.classList.add("resena-item");

      div.innerHTML = `
        <p>"${resena.contenido}"</p>
        <span>${resena.autor}</span>
      `;

      contenedor.appendChild(div);
    }
  });
});
}

cargarResenas();
</script>

</body>
</html>
