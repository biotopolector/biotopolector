<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Catálogo - Biotopo Lector</title>

  <style>
    body {
      font-family: "Georgia", serif;
      background-color: #f2efe7;
      margin: 0;
      color: #2c2c2c;
    }

    header {
      background-color: #e8e2d6;
      text-align: center;
      padding: 30px 20px;
      border-bottom: 1px solid #ccc;
    }

    header img {
      width: 140px;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    header h1 {
      margin: 0;
      font-weight: normal;
    }

    nav {
      text-align: center;
      padding: 10px;
      background-color: #d6cfc2;
    }

    nav a {
      margin: 0 10px;
      text-decoration: none;
      color: #2c2c2c;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .libro {
      background: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      border: 1px solid #e0d8c8;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      transition: transform 0.2s;
    }

    .libro:hover {
      transform: scale(1.03);
    }

    .libro img {
      width: 100%;
      border-radius: 5px;
    }

    .boton {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 12px;
      background-color: #6b4f4f;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-size: 14px;
    }

    .insta {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #6b4f4f;
      color: white;
      padding: 10px 15px;
      border-radius: 20px;
      text-decoration: none;
    }

  </style>
</head>

<body>

<header>
  <img src="imagenes/logo.png">
  <h1>Biotopo Lector</h1>
  <p>Catálogo</p>
</header>

<nav>
  <a href="index.html">Inicio</a>
  <a href="catalogo.html">Catálogo</a>
  <a href="contacto.html">Contacto</a>
</nav>

<div class="grid">

  <div class="libro">
    <img src="imagenes/libro1.jpg">
    <h3>Anna Karenina</h3>
    <p>León Tolstoi</p>
    <a class="boton" href="https://instagram.com/biotopolector" target="_blank">Reservar</a>
  </div>

  <div class="libro">
    <img src="imagenes/libro2.jpg">
    <h3>Guerra y paz</h3>
    <p>León Tolstoi</p>
    <a class="boton" href="https://instagram.com/biotopolector" target="_blank">Reservar</a>
  </div>

</div>

<a href="https://instagram.com/biotopolector" target="_blank" class="insta">
  Instagram
</a>

</body>
</html>
