<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Catálogo - Biotopo Lector</title>

  <style>
    body {
      font-family: "Georgia", serif;
      background-color: #f3efe6;
      margin: 0;
      color: #2a2a2a;
    }

    header {
      text-align: center;
      padding: 40px 20px 20px;
    }

    header img {
      width: 100px;
      border-radius: 50%;
    }

    nav {
      text-align: center;
      background-color: #e7dfcf;
      padding: 12px;
    }

    nav a {
      margin: 0 15px;
      text-decoration: none;
      color: #4f5b4a;
      font-weight: bold;
    }

    .intro {
      text-align: center;
      margin: 40px 20px 10px;
      font-style: italic;
      color: #4f5b4a;
    }

    .sub {
      text-align: center;
      margin-bottom: 40px;
      color: #666;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 40px;
      padding: 0 40px 60px;
    }

    .libro {
      text-align: center;
    }

    .libro img {
      width: 100%;
      border-radius: 6px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.08);
    }

    .libro h3 {
      margin: 12px 0 5px;
      font-size: 16px;
    }

    .libro p {
      margin: 0;
      font-size: 14px;
      color: #666;
    }

    .boton {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 12px;
      background-color: #6a2e2e;
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-size: 13px;
    }

  </style>
</head>

<body>

<header>
  <img src="imagenes/logo.png">

</nav>

  libros escogidos desde una lectura personal
</div>

<div class="sub">
  clásicos, narrativa y títulos que permanecen
</div>

<div class="grid">

  <div class="libro">
    <img src="imagenes/libro1.jpg">
    <h3>Anna Karenina</h3>
    <p>León Tolstói</p>
    <a class="boton" href="https://instagram.com/biotopolector" target="_blank">Reservar</a>
  </div>

</div>

</html>
