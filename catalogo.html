<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Catálogo - Biotopo Lector</title>

  <style>
    body {
      font-family: Georgia, serif;
      background-color: #f5f1eb;
      color: #2c2c2c;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .libro {
      background: #fff;
      padding: 20px;
      margin: 20px auto;
      max-width: 600px;
      border-left: 5px solid #6b1d1d;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .reseñas-libro {
      margin-top: 15px;
      padding-top: 10px;
      border-top: 1px solid #ddd;
    }

    .resena {
      background: #f9f6f1;
      padding: 10px;
      margin-bottom: 10px;
      border-left: 3px solid #6b1d1d;
    }

    .autor {
      font-style: italic;
      color: #555;
    }
  </style>
</head>

<body>

<h1>Catálogo</h1>

<div class="libro">
  <h2>Anna Karenina</h2>
  <p>León Tolstói</p>

  <div class="reseñas-libro" id="resenas-anna"></div>
</div>

<div class="libro">
  <h2>Guerra y paz</h2>
  <p>León Tolstói</p>

  <div class="reseñas-libro" id="resenas-guerra"></div>
</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = window.supabase.createClient(
  "https://vxodiycdileyqemlcxet.supabase.co",
  "sb_publishable_tn5y7SpuaTE6vfoLDoibFQ_o6sUqJ5J"
);

async function cargarResenasPorLibro(nombreLibro, contenedorId) {
  const { data, error } = await client
    .from("resenas")
    .select("*")
    .eq("aprobado", true)
    .ilike("libro", `%${nombreLibro}%`);

  if (error) {
    console.error(error);
    return;
  }

  const contenedor = document.getElementById(contenedorId);
  contenedor.innerHTML = "";

  if (data.length === 0) {
    contenedor.innerHTML = "<p>Sin reseñas aún.</p>";
    return;
  }

  data.forEach(r => {
    const div = document.createElement("div");
    div.classList.add("resena");

    div.innerHTML = `
      <p>"${r.contenido}"</p>
      <p class="autor">— ${r.autor}</p>
    `;

    contenedor.appendChild(div);
  });
}

// 🔥 LLAMADAS
cargarResenasPorLibro("Anna Karenina", "resenas-anna");
cargarResenasPorLibro("Guerra y paz", "resenas-guerra");

</script>

</body>
</html>
